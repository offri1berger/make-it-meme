version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: make-it-meme-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: make_it_meme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: make-it-meme-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: